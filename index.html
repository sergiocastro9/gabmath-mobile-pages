<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GabMath Mobile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <h1>GabMath Mobile</h1>
      <p class="subtitle">Leia o QR Code da prova e depois o cartao-resposta, sem precisar tirar foto manualmente.</p>

      <div class="status-bar">
        <span id="mode-badge" class="mode-badge">Aguardando</span>
      </div>

      <div class="step">
        <h2>1. Camera</h2>
        <div class="camera-stack">
          <video id="camera-video" playsinline muted></video>
          <canvas id="camera-overlay"></canvas>
        </div>
        <div class="actions">
          <button id="start-scan">Iniciar leitura</button>
          <button id="stop-scan" class="secondary">Parar</button>
        </div>
        <label class="field">
          <span>Ou cole manualmente o conteudo bruto do QR</span>
          <input id="proof-id-input" type="text" placeholder="Ex.: GABMATH1:eyJ2IjoxLCJpZCI6Ii4uLiJ9">
        </label>
        <button id="load-proof" class="full">Carregar prova</button>
        <p id="scan-status" class="status"></p>
      </div>

      <div id="proof-panel" class="step hidden">
        <h2>2. Cartao-resposta</h2>
        <div id="proof-summary" class="summary"></div>
        <p class="hint">Depois do QR, posicione o celular com calma sobre o cartao-resposta. A leitura do cartao so comeca quando voce tocar no botao abaixo.</p>
        <button id="start-card-scan" class="full">Iniciar leitura do cartao</button>
        <canvas id="aligned-preview" class="aligned-preview"></canvas>
        <div id="answer-grid" class="answer-grid"></div>
        <button id="correct-proof" class="full">Corrigir prova</button>
        <div id="result-panel" class="result hidden"></div>
        <button id="next-proof" class="secondary full">Ler outra prova</button>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>
  <script src="app.js"></script>
</body>
</html>
